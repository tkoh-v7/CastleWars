<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Create Team</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <h1>Create Team</h1>
      <nav>
        <a href="index.html">Home</a>
        <a href="create-team.html">Create Team</a>
        <a href="join-team.html">Join Team</a>
        <a href="dashboard.html">Dashboard</a>
      </nav>
    </div>

    <section class="card">
      <label for="teamName">Team Name</label>
      <input id="teamName" maxlength="30" placeholder="e.g. Zamorak Elite">

      <label for="teamTag">Team Tag</label>
      <input id="teamTag" maxlength="6" placeholder="e.g. ZE">

      <div style="margin-top:12px">
        <button id="createTeamBtn" class="good">Create Team</button>
      </div>

      <div id="teamCreateStatus" style="margin-top:12px"></div>
    </section>
  </div>

  <script src="league.js"></script>
  <script>
    document.getElementById("createTeamBtn").addEventListener("click", async () => {
      await createTeam(
        document.getElementById("teamName").value,
        document.getElementById("teamTag").value,
        "teamCreateStatus"
      );
    });
  </script>
</body>
</html>
